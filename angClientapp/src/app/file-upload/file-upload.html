<div class="form-group">
    <label for="file">Choose File</label>
    <input
        type="file"
        id="file"
        #fileInputRef
        (change)="onFileSelected($event)"
        [disabled]="isUploading"
    />

    <p class="file-meta">{{ selectedFileName }}</p>

    <div class="actions">
        <button type="button" (click)="uploadFileToActivity()" [disabled]="!fileToUpload || isUploading">
            {{ isUploading ? 'Uploading...' : 'Upload' }}
        </button>
        <button type="button" (click)="clearSelection(fileInputRef)" [disabled]="isUploading">
            Clear
        </button>
    </div>

    <p class="status success">{{ successMessage }}</p>
    <p class="status error">{{ errorMessage }}</p>
</div>
